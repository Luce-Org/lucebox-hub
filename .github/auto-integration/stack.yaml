# auto-integration patch stack state
# Branch: easel:auto-integration
# Policy:
#   - Track Luce-Org/lucebox-hub:main as the base.
#   - Only auto-integrate PRs from known contributors, defined as authors with
#     prior commits already present on upstream main.
#   - Avoid draft PRs unless they are very small and strictly required by a
#     selected non-draft PR.
#   - Human review/merge first-contribution PRs.
#   - Rebuild by resetting to upstream main and replaying included PRs in order.

