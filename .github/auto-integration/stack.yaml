rebuild_commands: |
  git fetch origin main --prune
  git fetch easel auto-integration --prune
  git checkout auto-integration
  git reset --hard origin/main
  for n in 262 269 274 276 275; do
    git fetch origin pull/$n/head:refs/heads/pr-$n
    git merge --no-ff pr-$n
  done
  # Re-apply any recorded conflict resolutions, then update .github/auto-integration/stack.yaml.
  git push --force-with-lease easel auto-integration
