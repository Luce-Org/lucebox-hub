checks_run:
  - command: "git diff --stat origin/main...HEAD"
    result: "Reviewed the current stack scope; most changes are already captured in the existing merge history, with #264 as the latest integration addition."
  - command: "git log --oneline --first-parent -n 15"
    result: "Confirmed the current first-parent stack order: 262 -> 269 -> 274 -> 276 -> 275 -> upstream main sync -> #282 -> #264."
  - command: "gh pr list --repo Luce-Org/lucebox-hub --state open --limit 12 --json number,title,isDraft,mergeable,headRefName,author"
    result: "Used to refresh the currently open PR classification for held/candidate decisions."
  - command: "git diff --check"
    result: "Passed with no whitespace or conflict-marker leftovers after the #264 merge."
  - command: "cmake -S /home/erik/Projects/luce2/server -B /tmp/luce2-build-cuda132 -DDFLASH27B_GPU_BACKEND=cuda -DCMAKE_CUDA_ARCHITECTURES=86 -DCMAKE_CUDA_COMPILER=/usr/local/cuda/bin/nvcc"
    result: "Configured with the local CUDA 13.2 toolchain, then stopped because deps/llama.cpp is missing from the source tree expected by server/CMakeLists.txt."
  - command: "git merge-tree --write-tree easel/auto-integration pr-152"
    result: "Reported PR #152 as a clean merge candidate."
  - command: "git diff --check"
    result: "Passed after merging #152 and updating stack metadata."
  - command: "python3 -m py_compile scripts/probe_gemma4_context.py scripts/verify_gemma4_4090.py"
    result: "Passed."
  - command: "bash -n scripts/lucebox-gemma4-4090.sh"
    result: "Passed."
  - command: "PowerShell parse of scripts/Start-LuceboxGemma4090.ps1"
    result: "Skipped because pwsh is not installed in this WSL environment."

notes:
  - "No easel-only helper branches were needed for this run."
  - "The branch is still intended to be pushed only to easel/auto-integration."

rebuild_commands: |
  git fetch origin main --prune
  git fetch easel auto-integration --prune
  git checkout auto-integration
  git reset --hard origin/main
  for n in 262 269 274 276 275 282 264 152; do
    git fetch origin pull/$n/head:refs/heads/pr-$n
    git merge --no-ff pr-$n
  done
  # Re-apply any recorded conflict resolutions, then update .github/auto-integration/stack.yaml.
  git push --force-with-lease easel auto-integration
