name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  uv-workspace:
    name: uv workspace (lock + sync + import smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"
      - name: Verify lockfile is in sync with pyproject.toml
        run: uv lock --check
      - name: Install workspace from frozen lockfile
        # Skip the torch CUDA index on the CI runner (~1 GB nvidia wheels);
        # the megakernel CUDA build job below exercises the full sync with
        # torch installed. Here we only validate dflash + pflash deps + the
        # import surface used by scripts/server.py.
        run: uv sync --frozen --no-install-package torch
      - name: Import smoke from repo root
        run: |
          uv run --frozen --no-sync python -c "
          import fastapi, uvicorn, transformers, jinja2, numpy, gguf, datasets, huggingface_hub
          import sys; sys.path.insert(0, 'dflash/scripts')
          import server  # noqa: F401
          print('workspace import OK from repo root')
          "
      - name: Workspace discovery from member subdir
        # Documented pattern in dflash/README.md: `cd lucebox-hub/dflash &&
        # uv run python scripts/server.py …`. Verify uv walks up to find
        # the workspace .venv from a member subdirectory.
        working-directory: dflash
        run: |
          uv run --frozen --no-sync python -c "
          import sys
          assert sys.prefix.rstrip('/').endswith('/lucebox-hub/.venv'), sys.prefix
          sys.path.insert(0, 'scripts')
          import server  # noqa: F401
          print('workspace discovery OK from dflash/')
          "

  build:
    name: Build (cmake + uv sync --extra megakernel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: Jimver/cuda-toolkit@v0.2.35
        with:
          # CUDA 13.0 matches the cu130 PyTorch wheel pinned in pyproject.toml.
          # Building megakernel's CUDAExtension links against torch's libs,
          # so toolkit + wheel must share the same major.
          cuda: '13.0.0'
          method: network
          sub-packages: '["nvcc", "cudart-dev", "thrust", "driver-dev"]'
          non-cuda-sub-packages: '["libcublas-dev"]'

      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"
          # uv reads .python-version (3.11) and downloads the matching
          # interpreter; no separate setup-python step needed.

      - name: Build dflash
        run: |
          cd dflash
          cmake -B build \
            -DCMAKE_CUDA_ARCHITECTURES="75;86" \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(nproc)

      - name: Build megakernel via uv sync (sm_75)
        env:
          CUDA_HOME: ${{ env.CUDA_PATH }}
          MEGAKERNEL_CUDA_ARCH: sm_75
        # Exercises the documented `uv sync --extra megakernel` flow:
        # workspace resolves torch from the cu130 index, uv builds an
        # isolated env from megakernel's [build-system] requires
        # (setuptools + wheel + torch), then setup.py compiles the
        # CUDAExtension and uv installs the resulting wheel.
        run: uv sync --extra megakernel

      - name: Verify megakernel extension imports
        run: |
          uv run --no-sync python -c "
          import torch
          import qwen35_megakernel_bf16_C as M
          print('megakernel sm_75 .so loads:', M.__file__)
          "

      - name: Rebuild megakernel via uv sync (sm_86)
        env:
          CUDA_HOME: ${{ env.CUDA_PATH }}
          MEGAKERNEL_CUDA_ARCH: sm_86
        # --reinstall-package forces uv to recompile the CUDAExtension
        # with the new MEGAKERNEL_CUDA_ARCH env var; without it, uv
        # would skip the already-installed package at the same version.
        run: uv sync --extra megakernel --reinstall-package qwen35-megakernel-bf16

      - name: Verify megakernel extension imports (sm_86)
        run: |
          uv run --no-sync python -c "
          import torch
          import qwen35_megakernel_bf16_C as M
          print('megakernel sm_86 .so loads:', M.__file__)
          "
